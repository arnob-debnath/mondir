<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>কমিটি — মন্দির</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="flower-canvas"></canvas>
<div id="nav-ph"></div>
<div id="ticker-ph"></div>
<div class="page-wrapper">
  <div class="page-header">
    <span class="label">পরিচালনা পর্ষদ</span>
    <h1>মন্দির কমিটি</h1>
    <div class="section-divider" style="margin-top:1rem"><div class="divider-line"></div><span class="divider-dot">👥</span><div class="divider-line r"></div></div>
  </div>
  <section style="padding:3rem 2rem;max-width:1100px;margin:0 auto">
    <div style="text-align:right;margin-bottom:1rem">
      <button class="btn btn-outline" style="font-size:.75rem" onclick="downloadList()">📄 তালিকা ডাউনলোড</button>
    </div>
    <div id="cm-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem"></div>
  </section>
</div>
<!-- Member Popup -->
<div class="member-popup" id="member-popup" style="display:none">
  <div class="member-popup-bg" onclick="closePopup()"></div>
  <div class="member-popup-box">
    <button class="member-popup-close" onclick="closePopup()">×</button>
    <div id="popup-img-wrap"></div>
    <div class="member-popup-name" id="popup-name"></div>
    <div class="member-popup-role" id="popup-role"></div>
    <div id="popup-bio" style="font-size:.8rem;color:rgba(255,255,255,.65);margin-bottom:1rem;line-height:1.7"></div>
    <div id="popup-phone" style="margin-bottom:.5rem"></div>
    <div id="popup-fb"></div>
    <button class="btn btn-outline" style="width:100%;justify-content:center;margin-top:1rem" onclick="closePopup()">বন্ধ করুন</button>
  </div>
</div>
<div id="footer-ph"></div>
<script src="../database/db.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>
<script>
function openPopup(m){
  document.getElementById('popup-img-wrap').innerHTML=m.image?`<img src="${m.image}" class="member-popup-img">`:`<div class="member-popup-ph">👤</div>`;
  document.getElementById('popup-name').textContent=m.name;
  document.getElementById('popup-role').textContent=m.role;
  document.getElementById('popup-bio').textContent=m.bio||'';
  document.getElementById('popup-phone').innerHTML=m.phone?`<a href="tel:${m.phone}" style="color:var(--gold);text-decoration:none;font-size:.82rem">📞 ${m.phone}</a>`:'';
  document.getElementById('popup-fb').innerHTML=m.facebook?`<a href="${m.facebook}" target="_blank" style="color:#4267B2;text-decoration:none;font-size:.82rem">👤 Facebook প্রোফাইল</a>`:'';
  document.getElementById('member-popup').style.display='flex';
  document.body.style.overflow='hidden';
}
function closePopup(){document.getElementById('member-popup').style.display='none';document.body.style.overflow='';}

function downloadList(){
  const members=DB.get('committee')||[];
  const text='মন্দির কমিটি তালিকা\n'+'━'.repeat(30)+'\n\n'+members.sort((a,b)=>a.order-b.order).map((m,i)=>`${i+1}. ${m.name}\n   পদবি: ${m.role}\n   ফোন: ${m.phone||'—'}\n`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='mandir-committee.txt';a.click();
}

document.addEventListener('DOMContentLoaded',()=>{
  if(typeof MandirFX!=='undefined')MandirFX.initTheme();
  DB.init();
  const db=DB.get(),s=db.settings;
  document.getElementById('nav-ph').innerHTML=getNavHTML(s);
  document.getElementById('ticker-ph').innerHTML=getTickerHTML(s.ticker_text);
  document.getElementById('footer-ph').innerHTML=getFooterHTML(s);
  document.title='কমিটি — '+s.mandir_name;
  initNav();
  const members=(db.committee||[]).sort((a,b)=>a.order-b.order);
  const grid=document.getElementById('cm-grid');
  members.forEach(m=>{
    const card=document.createElement('div');card.className='committee-card fade-in';
    card.innerHTML=`<div class="card-photo">${m.image?`<img src="${m.image}" alt="${m.name}">`:'👤'}</div><div class="card-info"><div class="card-name">${m.name}</div><div class="card-role">${m.role}</div></div>`;
    card.onclick=()=>openPopup(m);grid.appendChild(card);
  });
  if(!members.length)grid.innerHTML='<p style="color:var(--gray);text-align:center;grid-column:1/-1;padding:3rem">কোনো সদস্যের তথ্য পাওয়া যায়নি।</p>';
  initScrollAnim();
});
</script>
</body>
</html>
