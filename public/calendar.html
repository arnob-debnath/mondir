<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>পঞ্জিকা — মন্দির</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="flower-canvas"></canvas>
<div id="nav-ph"></div>
<div id="ticker-ph"></div>

<div class="page-wrapper">
  <div class="page-header">
    <span class="label">মন্দির পঞ্জিকা</span>
    <h1>পঞ্জিকা ক্যালেন্ডার</h1>
    <p style="font-size:.8rem;color:var(--gray);margin-top:.4rem">একাদশী • পারণ • উৎসব • বিশেষ দিন — সব একসাথে</p>
    <div class="section-divider" style="margin-top:1rem"><div class="divider-line"></div><span class="divider-dot">📅</span><div class="divider-line r"></div></div>
  </div>

  <div class="panjika-wrap">
    <!-- Legend -->
    <div class="cal-legend fade-in">
      <div class="cal-legend-item"><span class="cal-legend-pill tag-ekadashi">একাদশী</span></div>
      <div class="cal-legend-item"><span class="cal-legend-pill tag-paron">পারণ</span></div>
      <div class="cal-legend-item"><span class="cal-legend-pill tag-event">উৎসব</span></div>
      <div class="cal-legend-item"><span class="cal-legend-pill tag-note">বিশেষ নোট</span></div>
      <div class="cal-legend-item" style="margin-left:auto;font-size:.7rem;color:var(--gray)">📌 তারিখে ক্লিক করুন বিস্তারিত দেখতে</div>
    </div>

    <!-- Navigation -->
    <div class="cal-nav-bar fade-in">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">← আগের মাস</button>
      <div class="cal-month-title" id="cal-title"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">পরের মাস →</button>
    </div>

    <!-- Calendar grid -->
    <div id="cal-grid-wrap" class="fade-in"></div>

    <!-- Upcoming 30 days -->
    <div style="margin-top:2.5rem" class="fade-in">
      <div class="section-header" style="text-align:left;margin-bottom:1rem">
        <span class="section-label">আসন্ন বিশেষ দিন</span>
        <h3 class="section-title" style="font-size:1.1rem">আগামী ৩০ দিন</h3>
      </div>
      <div id="upcoming-list" style="display:flex;flex-direction:column;gap:.6rem"></div>
    </div>
  </div>
</div>

<!-- Day detail popup -->
<div id="day-popup" style="display:none" class="cal-day-popup">
  <div class="cal-day-popup-bg" onclick="closeDayPopup()"></div>
  <div class="cal-day-popup-box">
    <div class="cal-popup-title" id="popup-title">📅</div>
    <div id="popup-body"></div>
    <button class="btn btn-outline" style="width:100%;justify-content:center;margin-top:1rem" onclick="closeDayPopup()">বন্ধ করুন</button>
  </div>
</div>

<div id="footer-ph"></div>
<script src="../database/db.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>
<script>
const WDAYS=['রবি','সোম','মঙ্গল','বুধ','বৃহস্পতি','শুক্র','শনি'];
const MONTHS_BN=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const MONTHS_EN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
let curDate=new Date();

function getDayInfo(dateStr){
  const db=DB.get(),eka=getEkadashiList(),events=[...(db.events||[]),(db.past_events||[])].flat();
  const notes=db.calendar_notes||[];
  const res={ekadashi:null,isParon:false,paronText:'',events:[],notes:[]};
  const ek=eka.find(e=>e.date===dateStr);if(ek)res.ekadashi=ek;
  const prev=new Date(dateStr);prev.setDate(prev.getDate()-1);
  const prevStr=prev.toISOString().split('T')[0];
  const pek=eka.find(e=>e.date===prevStr);
  if(pek){res.isParon=true;res.paronText=PARON_TIMES[pek.paksha]||'পারণ করুন';}
  events.forEach(ev=>{if(ev.date===dateStr||ev.end_date===dateStr)res.events.push(ev);});
  notes.forEach(n=>{if(n.date===dateStr)res.notes.push(n);});
  return res;
}

function renderCalendar(){
  const y=curDate.getFullYear(),mo=curDate.getMonth();
  document.getElementById('cal-title').textContent=`${MONTHS_BN[mo]} ${y}`;
  const first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  let html='<div class="cal-grid">';
  WDAYS.forEach(d=>{html+=`<div class="cal-day-hdr">${d}</div>`;});
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info=getDayInfo(ds);
    const isToday=ds===today;
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(info.events.length)cls+=' has-event';
    if(info.ekadashi)cls+=' has-ekadashi';
    let tags='';
    if(info.ekadashi)tags+=`<span class="day-tag tag-ekadashi">🌙 ${info.ekadashi.name.split(' ')[0]}</span>`;
    if(info.isParon)tags+=`<span class="day-tag tag-paron">🙏 পারণ</span>`;
    info.events.slice(0,1).forEach(ev=>{tags+=`<span class="day-tag tag-event">🎊 ${ev.title.substring(0,7)}</span>`;});
    info.notes.slice(0,1).forEach(n=>{tags+=`<span class="day-tag tag-note">📌 ${n.text.substring(0,7)}</span>`;});
    html+=`<div class="${cls}" onclick="openDayPopup('${ds}',${d})"><span class="day-num">${d}</span>${tags}</div>`;
  }
  const rem=(first+days)%7===0?0:7-(first+days)%7;
  for(let i=0;i<rem;i++)html+=`<div class="cal-day empty"></div>`;
  html+='</div>';
  document.getElementById('cal-grid-wrap').innerHTML=html;
}

function openDayPopup(ds,d){
  const info=getDayInfo(ds);
  const wd=WDAYS[new Date(ds).getDay()];
  const mo=curDate.getMonth();
  document.getElementById('popup-title').innerHTML=`📅 ${wd}, ${d} ${MONTHS_BN[mo]} ${curDate.getFullYear()}`;
  let body='';
  if(!info.ekadashi&&!info.isParon&&!info.events.length&&!info.notes.length){body='<p style="color:var(--gray);font-size:.85rem;text-align:center;padding:1rem 0">এই দিনে কোনো বিশেষ কার্যক্রম নেই।</p>';}
  if(info.ekadashi){body+=`<div style="background:rgba(180,100,255,.1);border:1px solid rgba(180,100,255,.3);border-radius:10px;padding:1rem;margin-bottom:.7rem"><div style="color:#c084fc;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:.3rem">🌙 একাদশী</div><div style="color:#e9d5ff;font-size:.95rem;font-weight:700">${info.ekadashi.name}</div><div style="color:rgba(180,100,255,.8);font-size:.75rem;margin-top:.2rem">${info.ekadashi.paksha} • ${info.ekadashi.month}</div><div style="color:rgba(255,255,255,.5);font-size:.75rem;margin-top:.4rem">উপবাস পালন করুন</div></div>`;}
  if(info.isParon){body+=`<div style="background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.3);border-radius:10px;padding:1rem;margin-bottom:.7rem"><div style="color:#4ade80;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:.3rem">🙏 পারণ</div><div style="color:rgba(255,255,255,.85);font-size:.85rem">${info.paronText}</div></div>`;}
  info.events.forEach(ev=>{body+=`<div style="background:rgba(232,131,10,.08);border:1px solid rgba(232,131,10,.3);border-radius:10px;padding:1rem;margin-bottom:.7rem;cursor:pointer" onclick="window.location='event.html?id=${ev.id}'"><div style="color:var(--saffron);font-size:.7rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:.3rem">🎊 ইভেন্ট</div><div style="color:var(--gold);font-size:.95rem;font-weight:700">${ev.title}</div><div style="color:var(--gray);font-size:.75rem;margin-top:.2rem">${fmtTime(ev.time,ev.ampm)}</div></div>`;});
  info.notes.forEach(n=>{body+=`<div style="background:rgba(52,152,219,.06);border:1px solid rgba(52,152,219,.25);border-radius:10px;padding:1rem;margin-bottom:.7rem"><div style="color:#60a5fa;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:.3rem">📌 নোট</div><div style="color:rgba(255,255,255,.8);font-size:.85rem">${n.text}</div></div>`;});
  document.getElementById('popup-body').innerHTML=body;
  document.getElementById('day-popup').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeDayPopup(){document.getElementById('day-popup').style.display='none';document.body.style.overflow='';}

function changeMonth(dir){curDate=new Date(curDate.getFullYear(),curDate.getMonth()+dir,1);renderCalendar();}

function renderUpcoming(){
  const today=new Date();today.setHours(0,0,0,0);
  const limit=new Date(today);limit.setDate(limit.getDate()+30);
  const db=DB.get();const items=[];
  getEkadashiList().forEach(e=>{
    const d=new Date(e.date);
    if(d>=today&&d<=limit)items.push({date:e.date,label:'🌙 '+e.name,sub:e.paksha+' • '+e.month,color:'#c084fc',type:'eka'});
    const pd=new Date(e.date);pd.setDate(pd.getDate()+1);const ps=pd.toISOString().split('T')[0];
    if(pd>=today&&pd<=limit)items.push({date:ps,label:'🙏 পারণ',sub:PARON_TIMES[e.paksha]||'সকালে পারণ করুন',color:'#4ade80',type:'paron'});
  });
  (db.events||[]).forEach(ev=>{const d=new Date(ev.date);if(d>=today&&d<=limit)items.push({date:ev.date,label:'🎊 '+ev.title,sub:fmtTime(ev.time,ev.ampm),color:'var(--saffron)',type:'event',id:ev.id});});
  items.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const el=document.getElementById('upcoming-list');
  if(!items.length){el.innerHTML='<p style="color:var(--gray);font-size:.82rem">আগামী ৩০ দিনে কোনো বিশেষ কার্যক্রম নেই।</p>';return;}
  el.innerHTML=items.map(it=>{
    const d=new Date(it.date);const diff=Math.ceil((d-today)/86400000);
    const dl=diff===0?'🔴 আজ':diff===1?'🟡 আগামীকাল':`${diff} দিন পরে`;
    return`<div style="display:flex;gap:1rem;align-items:center;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:.85rem 1rem;cursor:${it.id?'pointer':'default'}" ${it.id?`onclick="window.location='event.html?id=${it.id}'"`:''}>
      <div style="min-width:50px;text-align:center;background:rgba(255,255,255,.04);border-radius:8px;padding:.4rem"><div style="font-size:1.3rem;font-weight:700;color:${it.color};line-height:1">${d.getDate()}</div><div style="font-size:.6rem;color:var(--gray);letter-spacing:1px">${MONTHS_EN[d.getMonth()]}</div></div>
      <div style="flex:1"><div style="font-size:.88rem;color:${it.color};font-weight:600">${it.label}</div><div style="font-size:.72rem;color:var(--gray);margin-top:.1rem">${it.sub||''}</div></div>
      <div style="font-size:.68rem;color:var(--gray);white-space:nowrap">${dl}</div>
    </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded',()=>{
  if(typeof MandirFX!=='undefined')MandirFX.initTheme();
  DB.init();
  const db=DB.get(),s=db.settings;
  document.getElementById('nav-ph').innerHTML=getNavHTML(s);
  document.getElementById('ticker-ph').innerHTML=getTickerHTML(s.ticker_text);
  document.getElementById('footer-ph').innerHTML=getFooterHTML(s);
  document.title='পঞ্জিকা — '+s.mandir_name;
  initNav();renderCalendar();renderUpcoming();initScrollAnim();
  new LotusCursorTrail();
});
</script>
</body>
</html>
